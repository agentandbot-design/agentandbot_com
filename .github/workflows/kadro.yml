name: kadro_platform

on:
  push:
    branches: [main]
    paths:
      - 'ai_kadro/kadro_platform/**'
      - '.github/workflows/kadro.yml'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/kadro-platform

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ai_kadro/kadro_platform
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
