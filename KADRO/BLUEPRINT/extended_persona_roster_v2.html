let filt=[...all];

function sf(btn,f){
  document.querySelectorAll('.si[data-f]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');cf=f;cp=1;af();
}

function af(){
  const t=document.getElementById('s').value.toLowerCase();cs=t;
  filt=all.filter(p=>{
    const fm=cf==='all'||p.arc===cf;
    const sm=!t||p.name.toLowerCase().includes(t)||p.country.toLowerCase().includes(t)||p.role.toLowerCase().includes(t);
    return fm&&sm;
  });
  cp=1;render();
}

function copyP(id){
  const p=all.find(x=>x.id===id);
  navigator.clipboard.writeText(p.prompt).then(()=>{
    const b=document.getElementById('cp'+id);
    if(b){b.textContent='Kopyalandı!';setTimeout(()=>{if(b)b.textContent='Kopyala';},1400);}
  });
}

function render(){
  const total=filt.length,tp=Math.ceil(total/PS),st=(cp-1)*PS,pg=filt.slice(st,st+PS);
  document.getElementById('inf').textContent=total+' karakter';
  document.getElementById('g').innerHTML=pg.map(p=>{
    const ac=arcColors[p.arc];
    return`<div class="card">
      <div class="ct">
        <div class="av" style="background:${ac.bg};color:${ac.fg}">${p.name.split(' ').map(x=>x[0]).join('').slice(0,2)}</div>
        <div style="flex:1;min-width:0">
          <p class="nm">${p.flag} ${p.name} <span style="font-size:11px;font-weight:400;color:var(--color-text-secondary)">${p.age}</span></p>
          <p class="ro">${p.country}</p>
          <span class="arc-badge" style="background:${ac.badge};color:${ac.badgetxt}">${ac.label}</span>
        </div>
      </div>
      <div class="bd">
        <p class="lb">Rol</p><p class="vl">${p.role}</p>
        <p class="lb">Arkaplan</p><p class="vl">${p.bg}</p>
        <p class="lb">Kişilik</p><p class="vl">${p.personality}</p>
        <p class="lb">İçerik</p><p class="vl">${p.content}</p>
        <p class="lb">Platformlar</p>
        <div class="pls">${p.social.map(s=>`<span class="pl">${s}</span>`).join('')}</div>
        <p class="vl" style="font-size:11px;margin-top:4px;color:var(--color-text-secondary)">${p.email}</p>
        <p class="lb">Görsel Prompt <button class="cp" id="cp${p.id}" onclick="copyP(${p.id})">Kopyala</button></p>
        <div class="pb">${p.prompt}</div>
      </div>
    </div>`;
  }).join('');

  const pg2=document.getElementById('pg');
  if(tp<=1){pg2.innerHTML='';return;}
  let h=`<button class="pb2" onclick="gp(${cp-1})" ${cp===1?'disabled':''}>← Önceki</button>`;
  for(let i=1;i<=tp;i++)h+=`<button class="pb2 ${i===cp?'on':''}" onclick="gp(${i})">${i}</button>`;
  h+=`<button class="pb2" onclick="gp(${cp+1})" ${cp===tp?'disabled':''}>Sonraki →</button>`;
  pg2.innerHTML=h;
}

function gp(p){cp=p;render();}
render();
</script>
