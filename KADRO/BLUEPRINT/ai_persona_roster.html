function filter(type) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  const cards = document.querySelectorAll('.persona-card');
  cards.forEach(c => {
    const roles = c.dataset.roles.split(',');
    if (type === 'all' || roles.includes(type)) {
      c.classList.remove('hidden');
    } else {
      c.classList.add('hidden');
    }
  });
}

function copyPrompt(id) {
  const p = personas.find(x => x.id === id);
  navigator.clipboard.writeText(p.prompt).then(() => {
    const btn = document.getElementById('copy-' + id);
    btn.textContent = 'Kopyalandı!';
    setTimeout(() => btn.textContent = 'Kopyala', 1500);
  });
}

          <p class="card-name">${p.flag} ${p.name} <span style="font-size:11px;font-weight:400;color:var(--color-text-secondary)">(${p.age})</span></p>
          <p class="card-title">${p.title}</p>
          <p class="card-title" style="font-size:11px">${p.origin}</p>
          <div class="tags">
            ${p.roles.filter(r => ['sap','ecom','dev'].includes(r)).map(r => `<span class="tag tag-${r}">${r==='sap'?'SAP':r==='ecom'?'E-Ticaret':'Yazılım'}</span>`).join('')}
            <span class="tag" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">${p.roles.includes('tr')?'Türkiye':'Global'}</span>
          </div>
        </div>
      </div>
      <div class="section">
        <p class="section-label">Şirket Rolleri</p>
        ${p.companies.map(c => `<p class="section-val" style="margin-bottom:2px">• ${c}</p>`).join('')}
        
        <p class="section-label">Kişilik</p>
