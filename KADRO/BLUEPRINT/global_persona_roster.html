let filtered = [...all];

function setRegion(btn, reg) {
  document.querySelectorAll('.filter-btn[data-reg]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeRegion = reg;
  currentPage = 1;
  applyFilters();
}

function applyFilters() {
  const term = document.getElementById('search').value.toLowerCase();
  searchTerm = term;
  filtered = all.filter(p => {
    const regionMatch = activeRegion === 'all' || p.region === activeRegion;
    const searchMatch = !term || p.name.toLowerCase().includes(term) || p.country.toLowerCase().includes(term);
    return regionMatch && searchMatch;
  });
  currentPage = 1;
  render();
}

function copyPrompt(id) {
  const p = all.find(x => x.id === id);
  navigator.clipboard.writeText(p.prompt).then(() => {
    const btn = document.getElementById('cp-' + id);
    if (btn) { btn.textContent = 'Kopyalandı!'; setTimeout(() => { if(btn) btn.textContent = 'Kopyala'; }, 1500); }
  });
}

function render() {
  const total = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('stats').textContent = total + ' karakter gösteriliyor';

  const grid = document.getElementById('grid');
  grid.innerHTML = page.map((p, i) => {
    const c = ramps[(p.id - 1) % ramps.length];
    return `<div class="card">
      <div class="card-top">
        <div class="avatar" style="background:${c.bg};color:${c.fg}">${p.initials||p.name.split(' ').map(x=>x[0]).join('').slice(0,2)}</div>
        <div style="flex:1">
          <p class="name">${p.flag} ${p.name} <span style="font-size:11px;font-weight:400;color:var(--color-text-secondary)">${p.age}</span></p>
          <p class="subtitle">${p.role}</p>
          <p class="subtitle">${p.country}</p>
          <div class="tags">
            <span class="tag" style="background:${c.bg}20;color:${c.bg}">${p.region==='africa'?'Afrika':p.region==='europe'?'Avrupa':p.region==='asia'?'Asya':p.region==='americas'?'Amerika':p.region==='oceania'?'Okyanusya':'Ortadoğu'}</span>
          </div>
        </div>
      </div>
      <div class="body">
        <p class="lbl">Kişilik</p>
        <p class="val">${p.personality}</p>
        <p class="lbl">İçerik</p>
        <p class="val">${p.content}</p>
        <p class="lbl">Platformlar</p>
        <div class="pills">${p.social.map(s=>`<span class="pill">${s}</span>`).join('')}</div>
        <p class="val" style="font-size:11px;margin-top:4px;color:var(--color-text-secondary)">${p.email}</p>
        <p class="lbl">Görsel Prompt <button class="copy-btn" id="cp-${p.id}" onclick="copyPrompt(${p.id})">Kopyala</button></p>
        <div class="prompt-box">${p.prompt}</div>
      </div>
    </div>`;
  }).join('');

  const pager = document.getElementById('pager');
  if (totalPages <= 1) { pager.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Önceki</button>`;
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Sonraki →</button>`;
  pager.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo(0,0);
}

render();
</script>
