<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇷 Türkiye Yerel Muhabirler — 81 İl</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E30A17;
    --red-dim: rgba(227,10,23,0.12);
    --red-glow: rgba(227,10,23,0.25);
    --bg: #0D0D0F;
    --surface: #16161A;
    --surface2: #1E1E24;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(227,10,23,0.35);
    --text: #F0EFEB;
    --muted: #7A7A85;
    --accent: #E30A17;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 40px 48px 32px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -80px; left: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(227,10,23,0.15), transparent 70%);
    pointer-events: none;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .header-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 52px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .header-title h1 span { color: var(--red); }
  .header-title p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .header-stats {
    display: flex;
    gap: 32px;
  }
  .stat {
    text-align: right;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--red);
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  /* CONTROLS */
  .controls {
    max-width: 1400px;
    margin: 32px auto 0;
    padding: 0 48px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px 11px 40px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--red); }
  input[type="text"]::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--text);
  }

  /* GRID */
  .grid {
    max-width: 1400px;
    margin: 32px auto 60px;
    padding: 0 48px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(227,10,23,0.1);
  }
  .card-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    font-weight: 700;
    position: relative;
  }
  .avatar::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 2px solid var(--red);
    opacity: 0.5;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    line-height: 1.2;
  }
  .card-age-badge {
    display: inline-block;
    background: var(--red-dim);
    color: var(--red);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .card-title {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 400;
  }
  .card-city {
    margin-top: 6px;
    font-size: 11px;
    color: var(--red);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-body {
    padding: 16px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
    margin-bottom: 5px;
  }

  .personality-text {
    font-size: 13px;
    color: #BEBEBE;
    line-height: 1.55;
  }

  .topics-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .topic-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: #BEBEBE;
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .platforms {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .platform-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 5px;
    font-weight: 500;
  }

  .email-row {
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
  }
  .email-row a { color: var(--muted); text-decoration: none; }
  .email-row a:hover { color: var(--red); }

  /* PROMPT SECTION */
  .prompt-section {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    background: rgba(0,0,0,0.2);
  }
  .prompt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .prompt-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .copy-btn:hover {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--text);
  }
  .copy-btn.copied {
    background: rgba(40,200,100,0.12);
    border-color: rgba(40,200,100,0.4);
    color: #40C864;
  }
  .prompt-text {
    font-size: 11.5px;
    color: #858590;
    line-height: 1.6;
    font-style: italic;
    max-height: 80px;
    overflow: hidden;
    transition: max-height 0.3s;
    cursor: pointer;
  }
  .prompt-text.expanded { max-height: 300px; }
  .prompt-text:hover { color: #AAAAB0; }

  /* NO RESULTS */
  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 16px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 24px 20px; }
    .controls { padding: 0 20px; }
    .grid { padding: 0 20px; grid-template-columns: 1fr; }
    .header-stats { gap: 20px; }
  }
</style>
</head>

let activeGender = 'all';

function getInitials(name) {
  return name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
}

const COLORS = [
  ['#2D1F3D','#9B59B6'],['#1A2D3D','#3498DB'],['#1F3D2D','#2ECC71'],
  ['#3D2D1A','#E67E22'],['#3D1A1A','#E30A17'],['#1A1A3D','#6C5CE7'],
  ['#2D3D1A','#27AE60'],['#3D2D2D','#E74C3C'],['#1A3D3D','#1ABC9C']
];

function getColor(idx) { return COLORS[idx % COLORS.length]; }

function platformIcon(p) {
  const icons = {
    'Instagram':'📷','YouTube':'▶️','TikTok':'🎵','LinkedIn':'💼',
    'Twitter/X':'𝕏','Podcast':'🎙️','Substack':'📝','Blog':'✍️',
    'Radyo':'📻','Telegram':'💬','Bağımsız Haber':'📰','NGO Blog':'🌱'
  };
  return icons[p] || '🔗';
}

function copyPrompt(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Kopyalandı';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '⎘ Kopyala';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function renderCards(data) {
  const grid = document.getElementById('grid');
  if (data.length === 0) {
    grid.innerHTML = '<div class="no-results">🔍 Sonuç bulunamadı</div>';
    return;
  }
  grid.innerHTML = data.map((c, i) => {
    const [bg, fg] = getColor(i);
    const initials = getInitials(c.name);
    const promptId = 'prompt-' + i;
    const btnId = 'btn-' + i;
    return `
    <div class="card" data-city="${c.city}" data-name="${c.name}" data-gender="${c.gender}" data-topics="${c.topics.join(' ')}">
      <div class="card-header">
        <div class="avatar" style="background:${bg};color:${fg};">${initials}</div>
        <div class="card-meta">
          <div class="card-name">🇹🇷 ${c.name}<span class="card-age-badge">${c.age}</span></div>
          <div class="card-title">${c.title}</div>
          <div class="card-city">📍 ${c.city} · ${c.region}</div>
        </div>
      </div>
      <div class="card-body">
        <div>
          <div class="section-label">Kişilik</div>
          <div class="personality-text">${c.personality}</div>
        </div>
        <div>
          <div class="section-label">İçerik Konuları</div>
          <div class="topics-list">${c.topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}</div>
        </div>
        <div>
          <div class="section-label">Platformlar & E-posta</div>
          <div class="platforms">${c.platforms.map(p => `<span class="platform-pill">${platformIcon(p)} ${p}</span>`).join('')}</div>
          <div class="email-row" style="margin-top:8px;"><a href="mailto:${c.email}">${c.email}</a></div>
        </div>
      </div>
      <div class="prompt-section">
        <div class="prompt-header">
          <span class="prompt-label">🎨 Görsel Prompt (Midjourney / DALL-E)</span>
          <button class="copy-btn" id="${btnId}" onclick="copyPrompt(this, \`${c.prompt.replace(/`/g,'\\`')}\`)">⎘ Kopyala</button>
        </div>
        <div class="prompt-text" id="${promptId}" onclick="this.classList.toggle('expanded')" title="Tam metni görmek için tıkla">${c.prompt}</div>
      </div>
    </div>`;
  }).join('');
}

function setGender(g, btn) {
  activeGender = g;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = CHARS.filter(c => {
    const matchGender = activeGender === 'all' || c.gender === activeGender;
    const matchSearch = !q || 
      c.name.toLowerCase().includes(q) || 
      c.city.toLowerCase().includes(q) || 
      c.title.toLowerCase().includes(q) || 
      c.topics.some(t => t.toLowerCase().includes(q)) ||
      c.region.toLowerCase().includes(q);
    return matchGender && matchSearch;
  });
  renderCards(filtered);
}

renderCards(CHARS);
</script>
